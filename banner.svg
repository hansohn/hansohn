<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Ryan Hansohn — Platform Engineering, Cloud, IaC, Reliability">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="0.55" stop-color="#0d1832"/>
      <stop offset="1" stop-color="#0a0f22"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waveA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c8aff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <ellipse cx="210" cy="40" rx="470" ry="300" fill="url(#glowBlue)" opacity="0.55"/>
  <ellipse cx="1060" cy="250" rx="520" ry="330" fill="url(#glowCyan)" opacity="0.5"/>

  <!-- terminal prompt mark -->
  <g opacity="0.5">
    <path d="M1024 120 L1052 142 L1024 164" fill="none" stroke="#7fcdf0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="1066" y="159" width="44" height="6" rx="3" fill="#67e8f9">
      <animate attributeName="opacity" values="1;0" keyTimes="0;0.5" dur="1.05s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- morphing waves (capsule-render style) -->
  <g>
    <path fill="url(#waveB)" d="M0 300 L 0 248 Q 300 286 600 262 T 1200 270 L 1200 300 Z">
      <animate attributeName="d" dur="20s" repeatCount="indefinite" begin="-10s"
        keyTimes="0;0.333;0.667;1" calcMode="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        values="M0 300 L 0 248 Q 300 286 600 262 T 1200 270 L 1200 300 Z;M0 300 L 0 262 Q 300 236 600 236 T 1200 252 L 1200 300 Z;M0 300 L 0 256 Q 300 240 600 262 T 1200 274 L 1200 300 Z;M0 300 L 0 248 Q 300 286 600 262 T 1200 270 L 1200 300 Z"/>
    </path>
    <path fill="url(#waveA)" d="M0 300 L 0 236 Q 300 272 600 246 T 1200 264 L 1200 300 Z">
      <animate attributeName="d" dur="20s" repeatCount="indefinite" begin="0s"
        keyTimes="0;0.333;0.667;1" calcMode="spline"
        keySplines="0.2 0 0.2 1;0.2 0 0.2 1;0.2 0 0.2 1"
        values="M0 300 L 0 236 Q 300 272 600 246 T 1200 264 L 1200 300 Z;M0 300 L 0 256 Q 300 270 600 254 T 1200 238 L 1200 300 Z;M0 300 L 0 268 Q 300 240 600 272 T 1200 240 L 1200 300 Z;M0 300 L 0 236 Q 300 272 600 246 T 1200 264 L 1200 300 Z"/>
    </path>
  </g>

  <!-- text -->
  <text x="64" y="100" fill="#22d3ee" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="18" letter-spacing="1">$ whoami</text>
  <text x="60" y="162" fill="#ffffff" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.5">Hi, I'm Ryan</text>
  <text x="64" y="210" fill="#cfe0f2" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22">Platform Engineering &#183; Cloud &#183; IaC &#183; Reliability</text>
</svg>
